name: Wire V9 Integration Branch Once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  wire-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: v9-split-policy-integration-20260518
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run surgical wiring codemod
        run: node tools/wire_v9_split_policy.mjs
      - name: Remove branch-only one-shot workflow
        run: rm -f .github/workflows/wire-v9-split-policy-once.yml
      - name: Commit wiring to integration branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/vilna_v9.js tools/wire_v9_split_policy.mjs .github/workflows/wire-v9-split-policy-once.yml
          if git diff --cached --quiet; then
            echo "No branch changes to commit"
          else
            git commit -m "Wire V9 split policy into vilna_v9 debug path"
            git push origin HEAD:v9-split-policy-integration-20260518
          fi
