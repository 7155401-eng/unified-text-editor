name: Wire V9 Split Policy Once

on:
  push:
    branches:
      - v9-split-policy-integration-20260518

permissions:
  contents: write

jobs:
  wire:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v9-split-policy-integration-20260518
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wire split policy helpers into vilna_v9
        run: node tools/wire_v9_split_policy.mjs
      - name: Remove one-shot workflow after use
        run: rm -f .github/workflows/wire-v9-split-policy-once.yml
      - name: Commit generated wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/vilna_v9.js tools/wire_v9_split_policy.mjs .github/workflows/wire-v9-split-policy-once.yml
          git commit -m "Wire V9 split policy into vilna_v9 debug path" || exit 0
          git push origin HEAD:v9-split-policy-integration-20260518
