name: Apply ref-anchor C1 codemod

on:
  push:
    branches:
      - fix-full-ref-anchor-identity-20260517
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-c1:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip c1]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix-full-ref-anchor-identity-20260517
          fetch-depth: 0

      - name: Run C1 codemod
        run: node scripts/apply-ref-anchor-c1.mjs

      - name: Show diff
        run: git diff -- src/engine/dom_packer.js

      - name: Commit C1 result if changed
        run: |
          if git diff --quiet -- src/engine/dom_packer.js; then
            echo "No dom_packer.js changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/engine/dom_packer.js
          git commit -m "Apply C1 ref anchor metadata preservation [skip c1]"
          git push origin HEAD:fix-full-ref-anchor-identity-20260517
