name: Apply source-based main refs codemod

on:
  push:
    branches:
      - fix-mainrefs-source-separation-20260517
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-mainrefs:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip mainrefs-codemod]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix-mainrefs-source-separation-20260517
          fetch-depth: 0

      - name: Run mainrefs codemod
        run: node scripts/apply-mainrefs-source-separation.mjs

      - name: Show diff
        run: git diff -- src/engine_bridge.js src/engine/dom_packer.js src/engine/renderer.js

      - name: Commit result if changed
        run: |
          if git diff --quiet -- src/engine_bridge.js src/engine/dom_packer.js src/engine/renderer.js; then
            echo "No source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/engine_bridge.js src/engine/dom_packer.js src/engine/renderer.js
          git commit -m "Apply source-based main refs separation [skip mainrefs-codemod]"
          git push origin HEAD:fix-mainrefs-source-separation-20260517
