<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="quill.snow.css" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0B1430;
    color: #E8EAF0;
    font-family: 'Segoe UI', 'David', 'Arial Hebrew', sans-serif;
    overflow: hidden;
  }
  #editor {
    height: 100%;
    background: #0B1430;
    color: #E8EAF0;
    border: none;
    font-size: 15px;
    direction: rtl;
  }
  .ql-container.ql-snow { border: none !important; height: 100%; }
  .ql-editor {
    min-height: 100%;
    padding: 12px 16px;
    line-height: 1.6;
    direction: rtl;
    text-align: right;
    color: #E8EAF0;
    caret-color: #D4AF37;
    font-size: 15px;
  }
  .ql-editor.ql-blank::before {
    color: #64748B;
    right: 16px;
    left: auto;
    font-style: normal;
    direction: rtl;
    text-align: right;
  }
  .ql-editor::-webkit-scrollbar { width: 10px; }
  .ql-editor::-webkit-scrollbar-thumb { background: #2A3454; border-radius: 5px; }
  .ql-editor::-webkit-scrollbar-track { background: #0B1430; }
  ::selection { background: #D4AF3766; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="quill.min.js"></script>
<script>
  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: { toolbar: false },
    formats: [],
    placeholder: 'תאר את הסצנה שתרצה לצייר...'
  });
  quill.root.setAttribute('dir', 'rtl');
  quill.root.style.direction = 'rtl';
  quill.root.style.textAlign = 'right';

  window.getText = function () { return quill.getText().replace(/\n+$/, ''); };
  window.setText = function (s) { quill.setText(s || ''); };
  window.clearText = function () { quill.setText(''); };
  window.focusEditor = function () { quill.focus(); };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Tab') { e.preventDefault(); }
  });

  // Bridge: notify parent when text changes (for reliable getText in postMessage flow)
  quill.on('text-change', function () {
    try {
      window.parent && window.parent.postMessage({
        type: 'hc-quill-text',
        text: window.getText()
      }, '*');
    } catch (e) {}
  });

  // Allow parent to request current text or set text via postMessage
  window.addEventListener('message', function (ev) {
    var d = ev.data || {};
    if (d.type === 'hc-quill-get') {
      try {
        ev.source && ev.source.postMessage({
          type: 'hc-quill-text',
          text: window.getText(),
          requestId: d.requestId
        }, '*');
      } catch (e) {}
    } else if (d.type === 'hc-quill-set') {
      window.setText(d.text || '');
    } else if (d.type === 'hc-quill-clear') {
      window.clearText();
    } else if (d.type === 'hc-quill-focus') {
      window.focusEditor();
    }
  });
</script>
</body>
</html>
