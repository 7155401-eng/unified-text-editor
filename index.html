<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>עורך משולב - TipTap + Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 data-i18n="appTitle">עורך משולב - TipTap + Engine</h1>
      <div class="status">
        עורך רב-טקסט, זרמים ומנוע הדפסה בעימוד חי.
      </div>
    </header>

    <main class="main">
      <section class="panel">
        <div class="ribbon-tabs" dir="rtl">
          <button type="button" data-ribbon-tab="file">קובץ</button>
          <button type="button" data-ribbon-tab="home">בית</button>
          <button type="button" data-ribbon-tab="insert">הוספה</button>
          <button type="button" data-ribbon-tab="layout">פריסה</button>
          <button type="button" data-ribbon-tab="streams">זרמים</button>
          <button type="button" data-ribbon-tab="view">תצוגה</button>
          <button type="button" data-ribbon-tab="tools">כלים</button>
        </div>
        <div class="toolbar" dir="rtl">
          <span class="tb-group" data-tab="home" data-title="טקסט">
            <button data-cmd="bold" title="מודגש"><b>B</b></button>
            <button data-cmd="italic" title="נטוי"><i>I</i></button>
            <button data-cmd="underline" title="קו תחתון"><u>U</u></button>
            <button data-cmd="strike" title="קו חוצה"><s>S</s></button>
            <button data-cmd="super" title="כתב עילי">x²</button>
            <button data-cmd="sub" title="כתב תחתי">x₂</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="home" data-title="צבע">
            <button data-cmd="color-red" title="טקסט אדום" style="color:#dc2626">A</button>
            <button data-cmd="color-blue" title="טקסט כחול" style="color:#2563eb">A</button>
            <button data-cmd="color-green" title="טקסט ירוק" style="color:#16a34a">A</button>
            <button data-cmd="color-gold" title="טקסט זהב" style="color:#D4AF37">A</button>
            <button data-cmd="color-clear" title="ניקוי צבע">A×</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="home" data-title="רקע">
            <button data-cmd="bg-yellow" title="רקע צהוב" style="background:#fef08a;color:#000">●</button>
            <button data-cmd="bg-cyan" title="רקע ציאן" style="background:#a5f3fc;color:#000">●</button>
            <button data-cmd="bg-pink" title="רקע ורוד" style="background:#fbcfe8;color:#000">●</button>
            <button data-cmd="bg-clear" title="ניקוי רקע">●×</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="home" data-title="כותרות">
            <button data-cmd="h1">H1</button>
            <button data-cmd="h2">H2</button>
            <button data-cmd="h3">H3</button>
            <button data-cmd="h4">H4</button>
            <button data-cmd="h5">H5</button>
            <button data-cmd="h6">H6</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="layout" data-title="רשימות">
            <button data-cmd="bullet" title="נקודות">•</button>
            <button data-cmd="ordered" title="ממוספרת">1.</button>
            <button data-cmd="check" title="וי">✓</button>
            <button data-cmd="indent-in" title="הזחה פנימה">⇨⇨</button>
            <button data-cmd="indent-out" title="הזחה החוצה">⇦⇦</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="layout" data-title="יישור">
            <button data-cmd="align-right" title="ימין">⇨</button>
            <button data-cmd="align-center" title="מרכז">↔</button>
            <button data-cmd="align-left" title="שמאל">⇦</button>
            <button data-cmd="align-justify" title="מוצדק">═</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="layout" data-title="כיוון">
            <button data-cmd="rtl">RTL</button>
            <button data-cmd="ltr">LTR</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="insert" data-title="בלוקים">
            <button data-cmd="blockquote" title="ציטוט">❝</button>
            <button data-cmd="code-block" title="קוד">⟨/⟩</button>
            <button data-cmd="link" title="קישור">🔗</button>
            <button data-cmd="unlink" title="הסר קישור">⛓⃠</button>
            <button data-cmd="image" title="תמונה">🖼</button>
            <button data-cmd="video" title="וידאו">▶</button>
            <button data-cmd="formula" title="נוסחה">∑</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="home" data-title="גופן">
            <button data-cmd="font-david">David</button>
            <button data-cmd="font-frank">Frank</button>
            <button data-cmd="font-segoe">Segoe</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="home" data-title="גודל">
            <button data-cmd="size-down-double" title="−2">−−</button>
            <button data-cmd="size-down" title="−1">−</button>
            <span id="fs-label" style="margin:0 6px;font-weight:bold">16</span>
            <button data-cmd="size-up" title="+1">+</button>
            <button data-cmd="size-up-double" title="+2">++</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="view" data-title="כללי">
            <button data-cmd="theme-toggle" title="בהיר/כהה">☀️/🌙</button>
            <button data-cmd="lang-toggle" id="lang-btn" title="עברית/English">EN</button>
            <button data-cmd="preview-toggle" title="מצב תצוגה">תצוגה</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="home" data-title="ניהול">
            <button data-cmd="clear" title="ניקוי עיצוב">⌫</button>
            <button data-cmd="undo" title="ביטול">↶</button>
            <button data-cmd="redo" title="חזרה">↷</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="streams" data-title="זרמים">
            <button data-cmd="stream-01" class="stream-btn s1" title="זרם 01">01</button>
            <button data-cmd="stream-02" class="stream-btn s2" title="זרם 02">02</button>
            <button data-cmd="stream-03" class="stream-btn s3" title="זרם 03">03</button>
            <button data-cmd="stream-04" class="stream-btn s4" title="זרם 04">04</button>
            <button data-cmd="stream-05" class="stream-btn s5" title="זרם 05">05</button>
            <button data-cmd="stream-06" class="stream-btn s6" title="זרם 06">06</button>
            <button data-cmd="stream-07" class="stream-btn s7" title="זרם 07">07</button>
            <button data-cmd="stream-08" class="stream-btn s8" title="זרם 08">08</button>
            <button data-cmd="stream-custom" title="זרם מותאם">…</button>
            <button data-cmd="stream-clear" title="הסר סימן">×</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="streams" data-title="ניווט סימנים">
            <button data-cmd="marker-prev" title="סימן קודם בראשי">⇧ ראשי</button>
            <button data-cmd="marker-next" title="סימן הבא בראשי">⇩ ראשי</button>
            <button data-cmd="stream-prev" title="סימן קודם">▲</button>
            <button data-cmd="stream-next" title="סימן הבא">▼</button>
            <button data-cmd="stream-count" title="ספירה">∑</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="tools" data-title="זיהוי אוטומטי">
            <button data-cmd="auto-parse" title="הדבק טקסט גולמי וזהה דפוסים">📥 הדבק וזהה</button>
            <button data-cmd="auto-parse-paste" title="זהה דפוסים בתוכן הקיים">🔍 זהה תוכן</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="file" data-title="קובץ">
            <button data-cmd="word-import" class="primary" data-i18n="import">טען Word</button>
            <button data-cmd="word-export" data-i18n="export">שמור Word</button>
            <button data-cmd="toggle-merge" class="blue" data-i18n="merge">מזג / פרק</button>
            <button data-cmd="split-notes-advanced" class="teal" data-i18n="split">הפרד הערות</button>
          </span>
          <span class="sep"></span>
          <span class="tb-group" data-tab="file" data-title="פעולות">
            <button data-cmd="load-sample" class="primary">טען דוגמה</button>
            <button data-cmd="load-sample-shulchan">שו"ע</button>
            <button data-cmd="load-sample-talmud">גמרא</button>
            <button data-cmd="engine-render" class="primary">רענן עמודים</button>
            <button data-cmd="export-json">JSON</button>
            <button data-cmd="round-trip">round-trip</button>
            <button data-cmd="diag-toggle" title="פתח/סגור אבחון">אבחון</button>
          </span>
        </div>
        <div class="panes-toolbar">
          <button data-cmd="pane-add" class="primary" title="הוסף חלונית עם זרם">+ חלונית</button>
          <button data-cmd="pane-remove" title="מחק חלונית פעילה">✕ הסר חלונית</button>
          <span class="sep" style="height:24px;width:1px;background:var(--border)"></span>
          <button data-cmd="split-to-panes" class="primary" title="פצל את הראשי לחלוניות לפי @NN">✂ פצל לחלוניות</button>
          <button data-cmd="merge-from-panes" title="אחד את החלוניות חזרה לראשי">⤺ אחד</button>
          <button data-cmd="sync-toggle" id="sync-btn" title="סנכרון גלילה בין חלוניות">🔗 גלילה</button>
          <button data-cmd="lines-toggle" title="מצב שורות — שורה לכל הערה">☷ שורות</button>
          <span class="pane-status">@01 בכל מקום מזוהה אוטומטית • Tab בתוך @NN לקפיצה</span>
          <span style="flex:1"></span>
          <button data-cmd="pane-clear-storage" title="אפס מצב חלוניות">↺ איפוס</button>
        </div>
        <div id="stream-settings-panel" class="stream-settings-panel" dir="rtl"></div>
        <div id="panes-container" class="panes-container" dir="rtl"></div>
      </section>

      <aside class="panel preview-pane">
        <h2>תצוגת עמודים</h2>
        <div id="pdf-toolbar" class="pdf-toolbar" dir="rtl">
          <button type="button" id="pdf-sidebar-toggle" title="לוח צד" class="pdf-tb-btn">☰</button>
          <span class="pdf-tb-sep"></span>
          <button type="button" id="pdf-first" title="עמוד ראשון" class="pdf-tb-btn">⟪</button>
          <button type="button" id="pdf-prev" title="עמוד קודם" class="pdf-tb-btn">‹</button>
          <span class="pdf-tb-page">
            <input type="number" id="pdf-page-input" min="1" value="1" class="pdf-tb-page-input" />
            <span id="pdf-page-total" class="pdf-tb-page-total">/ 0</span>
          </span>
          <button type="button" id="pdf-next" title="עמוד הבא" class="pdf-tb-btn">›</button>
          <button type="button" id="pdf-last" title="עמוד אחרון" class="pdf-tb-btn">⟫</button>
          <span class="pdf-tb-sep"></span>
          <button type="button" id="pdf-zoom-out" title="הקטן" class="pdf-tb-btn">−</button>
          <select id="pdf-zoom-select" class="pdf-tb-zoom-select" title="זום">
            <option value="auto">אוטומטי</option>
            <option value="fit">התאם רוחב</option>
            <option value="actual" selected>גודל מקורי</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1">100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
          <button type="button" id="pdf-zoom-in" title="הגדל" class="pdf-tb-btn">+</button>
          <span class="pdf-tb-sep"></span>
          <input type="search" id="pdf-find-input" placeholder="חיפוש בטקסט..." class="pdf-tb-find" />
          <button type="button" id="pdf-find-prev" title="התאמה קודמת" class="pdf-tb-btn">↑</button>
          <button type="button" id="pdf-find-next" title="התאמה הבאה" class="pdf-tb-btn">↓</button>
          <span id="pdf-find-status" class="pdf-tb-find-status"></span>
          <span class="pdf-tb-sep"></span>
          <button type="button" id="pdf-print" title="הדפס" class="pdf-tb-btn">⎙</button>
          <button type="button" id="pdf-download" title="הורד HTML" class="pdf-tb-btn">⬇</button>
        </div>
        <div class="pdf-body">
          <div id="pdf-sidebar" class="pdf-sidebar" hidden></div>
          <div id="pages-container" class="pages-container" dir="rtl">
            <div class="empty-hint">פלט העמודים של מנוע ההדפסה יופיע כאן.</div>
          </div>
        </div>
      </aside>
    </main>

    <section id="diagnostics-panel" class="diag-panel diag" hidden>
      <div class="diag-panel-inner">
        <button data-cmd="diag-toggle" class="diag-close" title="סגור">×</button>
        <h2>אבחון מלא</h2>
        <ul id="diag-list"></ul>
        <h3>JSON</h3>
        <pre id="json-out">—</pre>
      </div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
