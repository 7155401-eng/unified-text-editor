<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>רב טקסט לוורד AI</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <link rel="alternate icon" type="image/svg+xml" href="public/favicon.svg" />
    <!-- PWA: התקנה ככרום עצמאי, נעול לדומיין רב טקסט -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2c5aa0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="רב טקסט" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="/bridge_shim.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;500;700;800;900&family=Heebo:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/theme-base-refresh.css" />
    <link rel="stylesheet" href="/template-word-style.css" />
    <link rel="stylesheet" href="/template-judaica.css" />
    <link rel="stylesheet" href="/template-picker.css" />
    <script src="/template-picker.js" defer></script>
    <script src="/render-safety-addons.js" defer></script>
  </head>
  <body class="light-theme">
    <header class="app-header">
      <div class="app-header-row">
        <h1 data-i18n="appTitle" dir="rtl">
          <img src="/public/favicon.svg" alt="" class="app-logo" />רב טקסט לוורד
          AI
        </h1>
        <div class="app-header-actions" dir="rtl">
          <button
            type="button"
            id="btn-dev-updates"
            class="header-action-btn header-action-btn-icon"
            title="עדכוני פיתוח — מה חדש ומה בדרך"
            aria-label="עדכוני פיתוח — מה חדש ומה בדרך"
          >
            <span class="header-action-icon">📰</span
            ><span class="header-action-text">עדכוני פיתוח</span>
          </button>
          <button
            type="button"
            id="btn-report-bug"
            class="header-action-btn header-action-btn-icon"
            title="דווח על באג שמצאת"
            aria-label="דווח על באג שמצאת"
          >
            <span class="header-action-icon">🐞</span
            ><span class="header-action-text">דיווח באג</span>
          </button>
          <button
            type="button"
            id="btn-contact"
            class="header-action-btn header-action-btn-icon"
            title="צור קשר במייל"
            aria-label="צור קשר במייל"
          >
            <span class="header-action-icon">✉️</span
            ><span class="header-action-text">צור קשר</span>
          </button>
          <a
            href="tel:+972527155401"
            id="btn-phone"
            class="header-action-btn header-action-btn-phone"
            title="טלפון לשאלות — לחץ לחיוג, או הקלד 052-7155401"
            aria-label="טלפון לשאלות"
            dir="ltr"
            >📞 052-7155401</a
          >
        </div>
      </div>
      <div id="status" class="status status-row" dir="rtl" data-i18n="status">
        טען טקסט ולחץ "רנדר עמודים" כדי לראות את התצוגה.
      </div>
    </header>

    <main class="main">
      <section class="panel">
        <div class="toolbar source-stream-toolbar" dir="rtl">
          <span class="tb-group" data-title="סמן בחירה כזרם">
            <span
              class="stream-label-static"
              title="בחר טקסט בעורך הראשי, ולחץ על מספר זרם כדי לסמן את הבחירה ולהעבירה לזרם הזה"
              data-i18n="markAsStream"
              >📌 סמן בחירה כזרם:</span
            >
            <button
              type="button"
              data-stream="01"
              class="btn-stream stream-color-1"
              title="סמן טקסט נבחר כמגן אברהם"
            >
              מגן אברהם
            </button>
            <button
              type="button"
              data-stream="02"
              class="btn-stream stream-color-2"
              title="סמן טקסט נבחר כמשנה ברורה"
            >
              משנה ברורה
            </button>
            <button
              type="button"
              data-stream="03"
              class="btn-stream stream-color-3"
              title="סמן טקסט נבחר כביאור הלכה"
            >
              ביאור הלכה
            </button>
            <button
              type="button"
              data-stream="04"
              class="btn-stream stream-color-4"
              title="סמן טקסט נבחר כטורי זהב"
            >
              טורי זהב
            </button>
            <button
              type="button"
              data-stream="05"
              class="btn-stream stream-color-5"
              title="סמן טקסט נבחר ככף החיים"
            >
              כף החיים
            </button>
          </span>
        </div>
